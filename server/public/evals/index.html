    // ── Trace Viewer ────────────────────────────────────────────────────────────
    function TraceView({ showToast, report }) {
      const [cases, setCases] = useState([]);
      const [selectedCase, setSelectedCase] = useState(null);
      const [trace, setTrace] = useState(null);
      const [result, setResult] = useState(null);
      const [runningCase, setRunningCase] = useState(null);
      const [loading, setLoading] = useState(true);
      const [sidebarSearch, setSidebarSearch] = useState('');

      const failedIds = useMemo(() => new Set((report?.failures || []).map(f => f.caseId)), [report]);

      useEffect(() => {
        api('/dataset').then(d => { setCases(d.cases || []); setLoading(false); }).catch(e => {
          showToast(e.message, 'error'); setLoading(false);
        });
      }, []);

      const loadTrace = async (caseId) => {
        setSelectedCase(caseId);
        setTrace(null);
        setResult(null);
        try {
          const data = await api(`/traces/${caseId}`);
          setTrace(data.trace);
          setResult(data.result);
        } catch (e) {
          setTrace(null);
          setResult(null);
        }
      };

      const runSingle = async (caseId) => {
        setRunningCase(caseId);
        try {
          const data = await api(`/run/single/${caseId}`, { method: 'POST' });
          setResult(data.result);
          showToast(`${caseId}: ${data.result.allPassed ? 'PASSED' : 'FAILED'}`, data.result.allPassed ? 'success' : 'error');
          try { const td = await api(`/traces/${caseId}`); setTrace(td.trace); setResult(td.result); } catch {}
        } catch (e) { showToast(e.message, 'error'); }
        setRunningCase(null);
      };

      const filteredCases = cases.filter(c =>
        !sidebarSearch || c.id.toLowerCase().includes(sidebarSearch.toLowerCase()) ||
        (c.userName || '').toLowerCase().includes(sidebarSearch.toLowerCase())
      );

      if (loading) return <div className="flex justify-center py-20"><span className="spinner" /></div>;

      return (
        <div className="flex gap-4 h-[calc(100vh-140px)]">
          <div className="w-80 shrink-0 card overflow-hidden flex flex-col">
            <div className="p-3 border-b border-slate-700/50">
              <input value={sidebarSearch} onChange={e => setSidebarSearch(e.target.value)}
                placeholder="Filter cases..." className="w-full px-3 py-1.5 rounded-lg text-xs" />
            </div>
            <div className="overflow-y-auto flex-1">
              {filteredCases.map(c => {
                const status = report ? (failedIds.has(c.id) ? false : true) : null;
                return (
                  <button key={c.id} onClick={() => loadTrace(c.id)}
                    className={`w-full text-left px-3 py-2.5 text-sm border-b border-slate-800/50 hover:bg-slate-800/40 transition-colors flex items-center gap-2.5 ${selectedCase === c.id ? 'bg-slate-800/60 border-l-2 border-l-sky-400' : ''}`}>
                    <StatusIcon passed={status} size={14} />
                    <div className="min-w-0 flex-1">
                      <div className="font-mono text-[11px] text-sky-300 truncate">{c.id}</div>
                      <div className="text-[10px] text-slate-500">{c.segment}</div>
                    </div>
                  </button>
                );
              })}
            </div>
          </div>

          <div className="flex-1 card overflow-y-auto">
            {!selectedCase ? (
              <div className="flex flex-col items-center justify-center h-full text-slate-500 gap-2">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M15 15l5 5M10 17a7 7 0 110-14 7 7 0 010 14z"/></svg>
                <span className="text-sm">Select a test case to view its trace</span>
              </div>
            ) : (
              <div className="p-6">
                <div className="flex items-center gap-3 mb-5">
                  <h3 className="font-semibold text-slate-200 text-lg">{selectedCase}</h3>
                  <button onClick={() => runSingle(selectedCase)} disabled={!!runningCase}
                    className="btn-primary px-3 py-1.5 rounded-lg text-xs font-medium disabled:opacity-50 transition-all">
                    {runningCase === selectedCase ? <><span className="spinner mr-1" style={{width:12,height:12}} />Running...</> : 'Re-run'}
                  </button>
                  {result && (
                    <span className={`px-2.5 py-1 rounded-lg text-xs font-medium ${result.allPassed ? 'badge-pass' : 'badge-fail'}`}>
                      {result.allPassed ? 'PASSED' : 'FAILED'}
                    </span>
                  )}
                </div>

                {!result && !trace && (
                  <div className="card p-8 text-center text-slate-500">
                    <p className="text-sm">No trace data available for this case.</p>
                    <p className="text-xs mt-1">Run the eval to generate a trace.</p>
                  </div>
                )}

                {result && (
                  <div className="space-y-4">
                    {result.expectedBehaviors?.length > 0 && (
                      <div className="bg-slate-800/30 rounded-xl p-4 border border-slate-700/30">
                        <h4 className="text-[11px] text-slate-400 font-medium uppercase tracking-wider mb-2 flex items-center">
                          Expected Behaviors
                          <HelpTooltip text={TOOLTIPS.expectedBehaviors} />
                        </h4>
                        <div className="flex flex-wrap gap-1.5">
                          {result.expectedBehaviors.map((b, i) => (
                            <span key={i} className="badge-neutral px-2 py-0.5 rounded-md text-[11px]">{b}</span>
                          ))}
                        </div>
                      </div>
                    )}

                    {result.turns?.map((t, i) => (
                      <div key={i} className="bg-slate-900/50 rounded-xl border border-slate-700/30 overflow-hidden">
                        <div className="px-4 py-3 bg-slate-800/30 border-b border-slate-700/30 flex items-center gap-2">
                          <span className="text-xs font-medium text-slate-400">Turn {i + 1}</span>
                          <span className="text-xs text-slate-500">|</span>
                          <span className="text-sm text-slate-200">{t.userMessage}</span>
                        </div>
                        {t.response && (
                          <div className="p-4 space-y-3">
                            <pre className="bg-slate-950/50 rounded-lg p-3 text-xs text-slate-300 max-h-72 overflow-y-auto leading-relaxed border border-slate-800/50">{t.response.reply}</pre>
                            {t.response.followUps?.length > 0 && (
                              <div>
                                <span className="text-[10px] text-slate-500 uppercase tracking-wider">Follow-ups</span>
                                <div className="flex flex-wrap gap-1.5 mt-1">
                                  {t.response.followUps.map((f, j) => (
                                    <span key={j} className="px-2 py-1 rounded-lg text-[11px] bg-slate-800/50 text-slate-400 border border-slate-700/30">{f}</span>
                                  ))}
                                </div>
                              </div>
                            )}
                            {t.response.redirectUrl && (
                              <div className="text-xs text-slate-500">
                                <span className="text-[10px] uppercase tracking-wider">Redirect:</span> <span className="text-sky-400 font-mono">{t.response.redirectUrl}</span>
                              </div>
                            )}
                          </div>
                        )}
                        {t.codeEvals?.length > 0 && (
                          <div className="px-4 py-3 border-t border-slate-700/30 bg-slate-800/20">
                            <div className="flex flex-wrap gap-1.5">
                              {t.codeEvals.map((e, j) => (
                                <span key={j} className={`px-2 py-0.5 rounded-md text-[11px] font-medium ${e.passed ? 'badge-pass' : 'badge-fail'}`}
                                  title={e.details || ''}>
                                  {e.evalName}
                                </span>
                              ))}
                            </div>
                          </div>
                        )}
                        {t.error && <div className="px-4 py-2 text-red-400 text-xs bg-red-950/20">Error: {t.error}</div>}
                      </div>
                    ))}
                  </div>
                )}

                {trace && typeof trace === 'string' && (
                  <details className="mt-4" open={!result}>
                    <summary className="text-xs text-slate-500 cursor-pointer hover:text-slate-300 mb-2">Raw Trace Output</summary>
                    <pre className="bg-slate-950/50 rounded-xl p-4 text-[11px] text-slate-400 overflow-x-auto border border-slate-800/50">{trace}</pre>
                  </details>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ── Enhanced Failure Analysis ────────────────────────────────────────────────
    function FailureView({ report }) {
      const [expanded, setExpanded] = useState({});

      if (!report || !report.failures?.length) {
        return (
          <div className="flex flex-col items-center justify-center py-24 gap-4 text-slate-500">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01"/></svg>
            <span className="text-sm">{report ? 'No failures in the latest report.' : 'No reports available. Run evals first.'}</span>
          </div>
        );
      }

      const toggle = (key) => setExpanded(prev => ({ ...prev, [key]: !prev[key] }));

      const groups = {};
      for (const f of report.failures) {
        for (const eval_ of [...f.failedCodeEvals, ...f.failedJudgeEvals]) {
          if (!groups[eval_]) groups[eval_] = { cases: [], isJudge: f.failedJudgeEvals.includes(eval_) };
          groups[eval_].cases.push(f);
        }
      }
      const sortedGroups = Object.entries(groups).sort((a, b) => b[1].cases.length - a[1].cases.length);

      const evalDescriptions = {
        no_jargon: 'Response contains technical jargon (FOIR, DPD, delinquent, utilization) that users may not understand. The bot should use plain language equivalents.',
        segment_isolation: 'Response mentions programs/features from a different segment. Critical: DRP users should never see DCP content, and vice versa.',
        credit_score_accuracy: 'Credit score mentioned in response does not match the user\'s actual score from the data source.',
        lender_accuracy: 'Response mentions a lender name not found in the user\'s account list.',
        amount_accuracy: 'A rupee amount in the response doesn\'t match any known value from the user\'s data (within 5% tolerance).',
        follow_up_quality: 'Follow-up suggestions don\'t meet quality criteria: must have exactly 3, each 8-100 chars, no generic patterns.',
        user_name_mentioned: 'The bot\'s first response doesn\'t address the user by their first name.',
        no_em_dashes: 'Response contains em dashes, en dashes, or double hyphens which should be avoided.',
        redirect_correctness: 'Redirect URL doesn\'t match the allowed routes for this segment.',
        no_false_no_loans: 'Response claims user has no loans/debt when they actually have active accounts.',
        no_business_loan_leak: 'A credit card lender was mislabeled as a business loan provider.',
        personalization: 'Response doesn\'t reference enough specific data points from the user\'s profile. Should feel tailored, not generic.',
        empathy: 'Response lacks emotional acknowledgment for stress/harassment situations. Should be warm and supportive.',
        actionability: 'Response describes the situation but doesn\'t give clear, actionable next steps the user can take.',
        coherence: 'In multi-turn conversation, response repeats information or ignores prior context.',
        program_pitch: 'FREED program introduction feels forced, pushy, or unjustified given the user\'s situation.',
      };

      const reproSteps = (f) => {
        const steps = [
          `1. Open the chatbot with user: ${f.userName} (${f.segment})`,
          `2. Navigate to: http://localhost:3001/?eval=true`,
          `3. Enter the user's name to start the conversation`,
        ];
        steps.push(`4. Case ID: ${f.caseId}`);
        steps.push(`5. Run: npm run eval -- ${f.caseId}`);
        return steps;
      };

      return (
        <div className="space-y-5">
          <div className="flex items-center justify-between">
            <div>
              <h2 className="text-lg font-semibold text-slate-200">Failure Analysis</h2>
              <p className="text-sm text-slate-400 mt-0.5">{report.failures.length} failing cases across {sortedGroups.length} eval categories</p>
            </div>
            <div className="flex gap-2">
              <button onClick={() => setExpanded({})} className="btn-secondary px-3 py-1.5 rounded-lg text-xs transition-all">Collapse All</button>
              <button onClick={() => {
                const all = {};
                sortedGroups.forEach(([name]) => { all[name] = true; });
                setExpanded(all);
              }} className="btn-secondary px-3 py-1.5 rounded-lg text-xs transition-all">Expand All</button>
            </div>
          </div>

          {sortedGroups.map(([evalName, group]) => {
            const isOpen = expanded[evalName];
            const isJudge = group.isJudge;
            return (
              <div key={evalName} className="card overflow-hidden">
                <button onClick={() => toggle(evalName)}
                  className="w-full text-left px-5 py-4 flex items-center gap-3 hover:bg-slate-800/30 transition-colors">
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none"
                    className={`transform transition-transform ${isOpen ? 'rotate-90' : ''}`}>
                    <path d="M5 3l4 4-4 4" stroke="#64748b" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                  <span className={`px-2 py-0.5 rounded-md text-xs font-bold ${isJudge ? 'badge-warn' : 'badge-fail'}`}>
                    {group.cases.length}
                  </span>
                  <span className="font-semibold text-slate-200 text-sm flex-1">{evalName}</span>
                  <span className={`px-2 py-0.5 rounded-md text-[10px] font-medium uppercase tracking-wider ${isJudge ? 'badge-warn' : 'badge-fail'}`}>
                    {isJudge ? 'LLM Judge' : 'Code Eval'}
                  </span>
                </button>

                {isOpen && (
                  <div className="border-t border-slate-700/30">
                    {evalDescriptions[evalName] && (
                      <div className="px-5 py-3 bg-slate-800/20 border-b border-slate-700/30">
                        <p className="text-xs text-slate-400 leading-relaxed">{evalDescriptions[evalName]}</p>
                      </div>
                    )}

                    <div className="divide-y divide-slate-700/30">
                      {group.cases.map((c, i) => {
                        const caseKey = `${evalName}-${c.caseId}`;
                        const caseOpen = expanded[caseKey];
                        const relevantDetails = c.details?.filter(d =>
                          d.toLowerCase().includes(evalName.toLowerCase())
                        ) || [];
                        const displayDetails = relevantDetails.length > 0 ? relevantDetails : (c.details || []);

                        return (
                          <div key={i}>
                            <button onClick={() => toggle(caseKey)}
                              className="w-full text-left px-5 py-3 flex items-center gap-3 hover:bg-slate-800/20 transition-colors">
                              <svg width="10" height="10" viewBox="0 0 10 10" fill="none"
                                className={`transform transition-transform ${caseOpen ? 'rotate-90' : ''}`}>
                                <path d="M3.5 2l3.5 3-3.5 3" stroke="#475569" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                              </svg>
                              <StatusIcon passed={false} size={14} />
                              <span className="font-mono text-xs text-sky-300">{c.caseId}</span>
                              <span className={`px-1.5 py-0.5 rounded text-[10px] border ${segmentClass(c.segment)}`}>{c.segment}</span>
                              <span className="text-xs text-slate-500">{c.userName}</span>
                              <span className="text-[10px] text-slate-600 ml-auto">
                                {[...c.failedCodeEvals, ...c.failedJudgeEvals].length} failures
                              </span>
                            </button>

                            {caseOpen && (
                              <div className="px-5 pb-4 pl-12 space-y-3">
                                <div>
                                  <span className="text-[10px] text-slate-500 uppercase tracking-wider">All Failed Evals</span>
                                  <div className="flex flex-wrap gap-1.5 mt-1">
                                    {c.failedCodeEvals.map((e, j) => (
                                      <span key={`c-${j}`} className="badge-fail px-2 py-0.5 rounded-md text-[11px] font-medium">{e}</span>
                                    ))}
                                    {c.failedJudgeEvals.map((e, j) => (
                                      <span key={`j-${j}`} className="badge-warn px-2 py-0.5 rounded-md text-[11px] font-medium">{e}</span>
                                    ))}
                                  </div>
                                </div>

                                {displayDetails.length > 0 && (
                                  <div>
                                    <span className="text-[10px] text-slate-500 uppercase tracking-wider">What Went Wrong</span>
                                    <div className="mt-1 space-y-1">
                                      {displayDetails.map((d, j) => (
                                        <div key={j} className="text-xs text-slate-400 bg-slate-900/50 rounded-lg px-3 py-2 border border-slate-800/50 leading-relaxed">
                                          {d}
                                        </div>
                                      ))}
                                    </div>
                                  </div>
                                )}

                                <div>
                                  <span className="text-[10px] text-slate-500 uppercase tracking-wider">How to Reproduce</span>
                                  <div className="mt-1 bg-slate-900/50 rounded-lg px-3 py-2 border border-slate-800/50">
                                    {reproSteps(c).map((s, j) => (
                                      <div key={j} className="text-[11px] text-slate-400 py-0.5 font-mono">{s}</div>
                                    ))}
                                  </div>
                                </div>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      );
    }

    // ── Criteria Config View ────────────────────────────────────────────────────
    function CriteriaView({ showToast }) {
      const [criteria, setCriteria] = useState([]);
      const [model, setModel] = useState('gpt-4o-mini');
      const [loading, setLoading] = useState(true);
      const [editingId, setEditingId] = useState(null);
      const [editForm, setEditForm] = useState(null);
      const [showAdd, setShowAdd] = useState(false);
      const [addForm, setAddForm] = useState({
        id: '', name: '', description: '', prompt: '', category: 'custom', enabled: true,
        appliesWhen: { segments: ['*'], intents: ['*'], minTurn: 1 },
      });

      const ALL_SEGMENTS = ['DRP_Eligible', 'DRP_Ineligible', 'DCP_Eligible', 'DCP_Ineligible', 'DEP', 'NTC', 'Others'];
      const CATEGORIES = ['quality', 'accuracy', 'format', 'custom'];

      useEffect(() => {
        api('/criteria').then(d => {
          setCriteria(d.criteria || []);
          setModel(d.model || 'gpt-4o-mini');
          setLoading(false);
        }).catch(e => { showToast(e.message, 'error'); setLoading(false); });
      }, []);

      const toggle = async (id) => {
        try {
          const d = await api(`/criteria/${id}/toggle`, { method: 'PATCH' });
          setCriteria(prev => prev.map(c => c.id === id ? d.criterion : c));
          showToast(`${d.criterion.name} ${d.criterion.enabled ? 'enabled' : 'disabled'}`, 'success');
        } catch (e) { showToast(e.message, 'error'); }
      };

      const startEdit = (c) => { setEditingId(c.id); setEditForm({ ...c, appliesWhen: { ...c.appliesWhen } }); };
      const cancelEdit = () => { setEditingId(null); setEditForm(null); };

      const saveEdit = async () => {
        try {
          const d = await api(`/criteria/${editingId}`, { method: 'PUT', body: JSON.stringify(editForm) });
          setCriteria(prev => prev.map(c => c.id === editingId ? d.criterion : c));
          showToast('Criterion updated', 'success');
          cancelEdit();
        } catch (e) { showToast(e.message, 'error'); }
      };

      const deleteCriterion = async (id) => {
        try {
          await api(`/criteria/${id}`, { method: 'DELETE' });
          setCriteria(prev => prev.filter(c => c.id !== id));
          showToast('Criterion deleted', 'success');
        } catch (e) { showToast(e.message, 'error'); }
      };

      const addCriterion = async () => {
        if (!addForm.id || !addForm.name || !addForm.prompt) {
          showToast('ID, name, and prompt are required', 'error'); return;
        }
        try {
          const d = await api('/criteria', { method: 'POST', body: JSON.stringify(addForm) });
          setCriteria(prev => [...prev, d.criterion]);
          showToast('Criterion added', 'success');
          setShowAdd(false);
          setAddForm({ id: '', name: '', description: '', prompt: '', category: 'custom', enabled: true, appliesWhen: { segments: ['*'], intents: ['*'], minTurn: 1 } });
        } catch (e) { showToast(e.message, 'error'); }
      };

      const updateModel = async (newModel) => {
        try {
          await api('/criteria-config', { method: 'PUT', body: JSON.stringify({ model: newModel }) });
          setModel(newModel);
          showToast(`Judge model set to ${newModel}`, 'success');
        } catch (e) { showToast(e.message, 'error'); }
      };

      if (loading) return <div className="flex justify-center py-20"><span className="spinner" /></div>;

      const categoryGroups = {};
      criteria.forEach(c => {
        if (!categoryGroups[c.category]) categoryGroups[c.category] = [];
        categoryGroups[c.category].push(c);
      });

      const CriterionForm = ({ form, setForm, onSave, onCancel, saveLabel }) => (
        <div className="card p-5 space-y-4 border-sky-500/20">
          <div className="grid grid-cols-2 gap-4">
            <div>
              <label className="text-[11px] text-slate-400 font-medium uppercase tracking-wider block mb-1">ID</label>
              <input value={form.id} onChange={e => setForm({ ...form, id: e.target.value.toLowerCase().replace(/[^a-z0-9_]/g, '_') })}
                className="w-full px-3 py-2 rounded-xl text-sm" placeholder="e.g. my_criterion" disabled={saveLabel === 'Save'} />
            </div>
            <div>
              <label className="text-[11px] text-slate-400 font-medium uppercase tracking-wider block mb-1">Name</label>
              <input value={form.name} onChange={e => setForm({ ...form, name: e.target.value })}
                className="w-full px-3 py-2 rounded-xl text-sm" placeholder="Display name" />
            </div>
          </div>
          <div>
            <label className="text-[11px] text-slate-400 font-medium uppercase tracking-wider block mb-1">Description</label>
            <input value={form.description} onChange={e => setForm({ ...form, description: e.target.value })}
              className="w-full px-3 py-2 rounded-xl text-sm" placeholder="One-line description of what this criterion checks" />
          </div>
          <div className="grid grid-cols-3 gap-4">
            <div>
              <label className="text-[11px] text-slate-400 font-medium uppercase tracking-wider block mb-1">Category</label>
              <select value={form.category} onChange={e => setForm({ ...form, category: e.target.value })}
                className="w-full px-3 py-2 rounded-xl text-sm">
                {CATEGORIES.map(cat => <option key={cat} value={cat}>{cat}</option>)}
              </select>
            </div>
            <div>
              <label className="text-[11px] text-slate-400 font-medium uppercase tracking-wider block mb-1">Min Turn</label>
              <input type="number" min="1" max="10" value={form.appliesWhen?.minTurn || 1}
                onChange={e => setForm({ ...form, appliesWhen: { ...form.appliesWhen, minTurn: parseInt(e.target.value) || 1 } })}
                className="w-full px-3 py-2 rounded-xl text-sm" />
            </div>
            <div className="flex items-end">
              <label className="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" checked={form.enabled} onChange={e => setForm({ ...form, enabled: e.target.checked })} className="accent-sky-500" />
                <span className="text-sm text-slate-300">Enabled</span>
              </label>
            </div>
          </div>
          <div>
            <label className="text-[11px] text-slate-400 font-medium uppercase tracking-wider block mb-1">
              Segments <span className="text-slate-600">(use * for all)</span>
            </label>
            <div className="flex flex-wrap gap-1.5 mt-1">
              <button type="button" onClick={() => setForm({ ...form, appliesWhen: { ...form.appliesWhen, segments: ['*'] } })}
                className={`chip px-2 py-0.5 rounded-md text-[11px] border ${form.appliesWhen?.segments?.includes('*') ? 'badge-pass chip-selected' : 'badge-neutral'}`}>All (*)</button>
              {ALL_SEGMENTS.map(seg => {
                const active = form.appliesWhen?.segments?.includes(seg);
                return (
                  <button key={seg} type="button" onClick={() => {
                    const segs = (form.appliesWhen?.segments || []).filter(s => s !== '*');
                    setForm({ ...form, appliesWhen: { ...form.appliesWhen, segments: active ? segs.filter(s => s !== seg) : [...segs, seg] } });
                  }} className={`chip px-2 py-0.5 rounded-md text-[11px] border ${active ? segmentClass(seg) + ' chip-selected' : 'badge-neutral'}`}>{seg}</button>
                );
              })}
            </div>
          </div>
          <div>
            <label className="text-[11px] text-slate-400 font-medium uppercase tracking-wider block mb-1">
              Prompt <span className="text-slate-600">(system prompt for the LLM judge)</span>
            </label>
            <textarea value={form.prompt} onChange={e => setForm({ ...form, prompt: e.target.value })}
              className="w-full px-3 py-2 rounded-xl text-xs font-mono h-48 resize-y" placeholder="You are evaluating whether..." />
          </div>
          <div className="flex gap-3 pt-2">
            <button type="button" onClick={onSave} className="btn-primary px-4 py-2 rounded-xl text-sm font-medium">{saveLabel}</button>
            <button type="button" onClick={onCancel} className="btn-secondary px-4 py-2 rounded-xl text-sm">Cancel</button>
          </div>
        </div>
      );

      return (
        <div className="space-y-6">
          {/* Global settings */}
          <div className="card p-4 flex items-center justify-between">
            <div className="flex items-center gap-4">
              <h3 className="text-sm font-semibold text-slate-300">Judge Configuration</h3>
              <div className="flex items-center gap-2">
                <label className="text-[11px] text-slate-400 font-medium uppercase tracking-wider">Model:</label>
                <select value={model} onChange={e => updateModel(e.target.value)} className="px-3 py-1.5 rounded-lg text-xs">
                  <option value="gpt-4o-mini">gpt-4o-mini (fast, cheap)</option>
                  <option value="gpt-4o">gpt-4o (better, slower)</option>
                  <option value="gpt-4.1-mini">gpt-4.1-mini</option>
                </select>
              </div>
              <span className="text-xs text-slate-500">{criteria.length} criteria ({criteria.filter(c => c.enabled).length} enabled)</span>
            </div>
            <button onClick={() => setShowAdd(!showAdd)}
              className={`${showAdd ? 'btn-secondary' : 'btn-primary'} px-4 py-2 rounded-xl text-sm font-medium transition-all`}>
              {showAdd ? 'Cancel' : '+ New Criterion'}
            </button>
          </div>

          {/* Add form */}
          {showAdd && <CriterionForm form={addForm} setForm={setAddForm} onSave={addCriterion} onCancel={() => setShowAdd(false)} saveLabel="Create" />}

          {/* Criteria by category */}
          {Object.entries(categoryGroups).map(([cat, items]) => (
            <div key={cat} className="space-y-3">
              <h3 className="text-xs font-bold text-slate-500 uppercase tracking-widest flex items-center gap-2">
                <span className={`w-2 h-2 rounded-full ${cat === 'quality' ? 'bg-sky-500' : cat === 'accuracy' ? 'bg-green-500' : cat === 'format' ? 'bg-amber-500' : 'bg-purple-500'}`} />
                {cat} ({items.length})
              </h3>
              {items.map(c => (
                <div key={c.id} className={`card card-hover p-4 transition-all ${!c.enabled ? 'opacity-50' : ''}`}>
                  {editingId === c.id ? (
                    <CriterionForm form={editForm} setForm={setEditForm} onSave={saveEdit} onCancel={cancelEdit} saveLabel="Save" />
                  ) : (
                    <div className="flex items-start justify-between">
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2 mb-1">
                          <button onClick={() => toggle(c.id)} className={`w-9 h-5 rounded-full transition-all relative ${c.enabled ? 'bg-sky-500' : 'bg-slate-700'}`}>
                            <span className={`absolute top-0.5 w-4 h-4 rounded-full bg-white transition-all ${c.enabled ? 'left-4' : 'left-0.5'}`} />
                          </button>
                          <span className="text-sm font-semibold text-slate-200">{c.name}</span>
                          <span className="font-mono text-[10px] text-slate-500">{c.id}</span>
                        </div>
                        <p className="text-xs text-slate-400 mb-2">{c.description}</p>
                        <div className="flex flex-wrap gap-1.5">
                          {c.appliesWhen.segments.includes('*')
                            ? <span className="badge-neutral px-1.5 py-0.5 rounded text-[10px] border">All segments</span>
                            : c.appliesWhen.segments.map(s => <span key={s} className={`px-1.5 py-0.5 rounded text-[10px] border ${segmentClass(s)}`}>{s}</span>)
                          }
                          {c.appliesWhen.intents.includes('*')
                            ? <span className="badge-neutral px-1.5 py-0.5 rounded text-[10px] border">All intents</span>
                            : c.appliesWhen.intents.slice(0, 3).map(i => <span key={i} className="badge-warn px-1.5 py-0.5 rounded text-[10px] border">{i.replace('INTENT_', '')}</span>)
                          }
                          {c.appliesWhen.minTurn > 1 && <span className="badge-neutral px-1.5 py-0.5 rounded text-[10px] border">Turn {c.appliesWhen.minTurn}+</span>}
                          {c.preCheck && <span className="badge-pass px-1.5 py-0.5 rounded text-[10px] border">Pre-check</span>}
                        </div>
                      </div>
                      <div className="flex gap-2 ml-4 shrink-0">
                        <button onClick={() => startEdit(c)} className="btn-secondary px-3 py-1.5 rounded-lg text-xs">Edit</button>
                        <button onClick={() => { if (confirm(`Delete criterion "${c.name}"?`)) deleteCriterion(c.id); }}
                          className="btn-danger px-3 py-1.5 rounded-lg text-xs">Delete</button>
                      </div>
                    </div>
                  )}
                </div>
              ))}
            </div>
          ))}
        </div>
      );
    }

    // ── App ─────────────────────────────────────────────────────────────────────
    function App() {
      const [tab, setTab] = useState('overview');
      const [report, setReport] = useState(null);
      const [running, setRunning] = useState(false);
      const [toast, setToast] = useState(null);
      const [caseFilter, setCaseFilter] = useState(null);

      const showToast = useCallback((message, type = 'info', action = null) => {
        setToast({ message, type, action, key: Date.now() });
      }, []);

      useEffect(() => {
        api('/reports/latest').then(d => setReport(d.report)).catch(() => {});
      }, []);

      const runEvals = async (type) => {
        setRunning(true);
        showToast(`Starting ${type} eval run...`, 'info');
        try {
          const endpoint = type === 'code' ? '/run/code' : '/run';
          const data = await api(endpoint, { method: 'POST' });
          setReport(data.report);
          showToast(
            `Complete: ${data.report.passedCases}/${data.report.totalCases} passed (${data.report.overallRate})`,
            data.report.failedCases > 0 ? 'error' : 'success'
          );
        } catch (e) { showToast(e.message, 'error'); }
        setRunning(false);
      };

      const handleFilterCases = (segment, intent) => {
        setCaseFilter({ segment, intent });
        setTab('cases');
      };

      const tabs = [
        { id: 'overview', label: 'Overview' },
        { id: 'cases', label: 'Test Cases' },
        { id: 'coverage', label: 'Coverage Map' },
        { id: 'criteria', label: 'Judge Criteria' },
        { id: 'traces', label: 'Traces' },
        { id: 'failures', label: 'Failures', badge: report?.failedCases },
        { id: 'reports', label: 'Reports' },
      ];

      return (
        <div className="min-h-screen">
          {toast && <Toast key={toast.key} message={toast.message} type={toast.type} action={toast.action} onClose={() => setToast(null)} />}

          <header className="border-b border-slate-700/50 bg-slate-900/30 backdrop-blur-xl sticky top-0 z-40">
            <div className="max-w-7xl mx-auto px-6 py-3.5 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-sky-400 to-blue-600 flex items-center justify-center">
                  <span className="text-white text-xs font-bold">F</span>
                </div>
                <div>
                  <span className="text-sm font-bold text-white">FREED</span>
                  <span className="text-sm text-slate-400 ml-1.5">Eval Dashboard</span>
                </div>
              </div>
              <div className="flex items-center gap-3 text-xs text-slate-500">
                {report && <span>Last run: {new Date(report.timestamp).toLocaleString()}</span>}
                {running && <><span className="spinner" /><span className="text-sky-400">Running...</span></>}
              </div>
            </div>
            <nav className="max-w-7xl mx-auto px-6 flex gap-1">
              {tabs.map(t => (
                <button key={t.id} onClick={() => setTab(t.id)}
                  className={`px-4 py-2.5 text-sm font-medium rounded-t-lg transition-all ${tab === t.id ? 'tab-active' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800/30'}`}>
                  {t.label}
                  {t.id === 'failures' && t.badge > 0 && (
                    <span className="ml-1.5 px-1.5 py-0.5 rounded-full text-[10px] bg-red-500/20 text-red-400 font-bold">{t.badge}</span>
                  )}
                </button>
              ))}
            </nav>
          </header>

          <main className="max-w-7xl mx-auto px-6 py-6">
            {tab === 'overview' && <OverviewView report={report} onRunEvals={runEvals} running={running} />}
            {tab === 'cases' && <TestCaseView showToast={showToast} report={report} />}
            {tab === 'coverage' && <CoverageMapView showToast={showToast} onFilterCases={handleFilterCases} />}
            {tab === 'criteria' && <CriteriaView showToast={showToast} />}
            {tab === 'traces' && <TraceView showToast={showToast} report={report} />}
            {tab === 'failures' && <FailureView report={report} />}
            {tab === 'reports' && <ReportsView showToast={showToast} />}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

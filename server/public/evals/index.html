<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FREED Chatbot — Eval Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.9/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            bg: '#0a0f1e',
            card: '#0d1526',
            border: '#1e293b',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; background: #0a0f1e; color: #e2e8f0; }
    .tab-active { border-bottom: 2px solid #38bdf8; color: #f0f9ff; }
    .tab-inactive { border-bottom: 2px solid transparent; color: #64748b; }
    .tab-inactive:hover { color: #94a3b8; border-bottom-color: #334155; }
    .spinner { border: 2px solid rgba(51,65,85,0.5); border-top-color: #38bdf8; border-radius: 50%; width: 14px; height: 14px; animation: spin 0.7s linear infinite; display: inline-block; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast { animation: toastIn 0.3s ease; }
    @keyframes toastIn { from { transform: translateX(16px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .progress-track { background: rgba(30,41,59,0.8); border-radius: 9999px; overflow: hidden; }
    .progress-fill { border-radius: 9999px; transition: width 0.5s ease; height: 100%; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #334155; }
    input, select, textarea { background: #0d1526; border: 1px solid #1e293b; color: #e2e8f0; transition: border-color 0.15s; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #38bdf8; box-shadow: 0 0 0 2px rgba(56,189,248,0.12); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    .autocomplete-dropdown { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: #0d1526; border: 1px solid #1e293b; border-radius: 8px; max-height: 200px; overflow-y: auto; z-index: 50; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo, useRef } = React;

    // ── API ─────────────────────────────────────────────────────────────────────
    const BASE = '/api/evals';
    async function apiCall(path, opts = {}) {
      const res = await fetch(`${BASE}${path}`, { headers: { 'Content-Type': 'application/json' }, ...opts });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      return data;
    }

    // ── Helpers ──────────────────────────────────────────────────────────────────
    function formatDate(d) {
      if (!d) return '—';
      return new Date(d).toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function segmentColor(seg) {
      if (!seg) return { bg: 'rgba(148,163,184,0.08)', text: '#94a3b8', border: 'rgba(148,163,184,0.2)' };
      const s = seg.toLowerCase();
      if (s.includes('drp')) return { bg: 'rgba(239,68,68,0.08)', text: '#f87171', border: 'rgba(239,68,68,0.2)' };
      if (s.includes('dcp')) return { bg: 'rgba(168,85,247,0.08)', text: '#c084fc', border: 'rgba(168,85,247,0.2)' };
      if (s.includes('dep')) return { bg: 'rgba(34,197,94,0.08)', text: '#4ade80', border: 'rgba(34,197,94,0.2)' };
      if (s.includes('ntc')) return { bg: 'rgba(56,189,248,0.08)', text: '#38bdf8', border: 'rgba(56,189,248,0.2)' };
      return { bg: 'rgba(148,163,184,0.08)', text: '#94a3b8', border: 'rgba(148,163,184,0.2)' };
    }

    function SegmentBadge({ seg }) {
      const c = segmentColor(seg);
      return (
        <span className="px-1.5 py-0.5 rounded text-[11px] font-medium border"
          style={{ background: c.bg, color: c.text, borderColor: c.border }}>
          {seg || 'unknown'}
        </span>
      );
    }

    function StatusDot({ passed }) {
      if (passed === true) return <span className="status-dot" style={{ background: '#22c55e' }} />;
      if (passed === false) return <span className="status-dot" style={{ background: '#ef4444' }} />;
      return <span className="status-dot" style={{ background: '#475569' }} />;
    }

    function passColor(rate) {
      const r = parseFloat(rate);
      if (r >= 85) return '#22c55e';
      if (r >= 65) return '#eab308';
      return '#ef4444';
    }

    // ── Toast ────────────────────────────────────────────────────────────────────
    function ToastContainer({ toasts, removeToast }) {
      return (
        <div className="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none">
          {toasts.map(t => (
            <div key={t.id} className="toast pointer-events-auto flex items-center gap-3 px-4 py-3 rounded-lg border text-sm max-w-sm shadow-xl"
              style={{
                background: t.type === 'error' ? 'rgba(127,29,29,0.9)' : t.type === 'success' ? 'rgba(20,83,45,0.9)' : 'rgba(12,74,110,0.9)',
                borderColor: t.type === 'error' ? 'rgba(239,68,68,0.3)' : t.type === 'success' ? 'rgba(34,197,94,0.3)' : 'rgba(56,189,248,0.3)',
                backdropFilter: 'blur(12px)',
              }}>
              <span className="flex-1 text-slate-100">{t.message}</span>
              <button onClick={() => removeToast(t.id)} className="text-slate-400 hover:text-white text-base leading-none">&times;</button>
            </div>
          ))}
        </div>
      );
    }

    function useToast() {
      const [toasts, setToasts] = useState([]);
      const addToast = useCallback((message, type = 'info') => {
        const id = Date.now();
        setToasts(t => [...t, { id, message, type }]);
        setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 5000);
      }, []);
      const removeToast = useCallback((id) => setToasts(t => t.filter(x => x.id !== id)), []);
      return { toasts, addToast, removeToast };
    }

    // ── Failure Analysis ────────────────────────────────────────────────────────
    function FailureAnalysis({ failures, onGoToTrace }) {
      const [expandedId, setExpandedId] = useState(null);
      const [traceCache, setTraceCache] = useState({});
      const [loadingTrace, setLoadingTrace] = useState(null);

      const loadTrace = async (caseId) => {
        if (expandedId === caseId) { setExpandedId(null); return; }
        setExpandedId(caseId);
        if (traceCache[caseId]) return;
        setLoadingTrace(caseId);
        try {
          const d = await apiCall(`/traces/${caseId}`);
          setTraceCache(prev => ({ ...prev, [caseId]: d.result }));
        } catch (e) {
          setTraceCache(prev => ({ ...prev, [caseId]: null }));
        }
        setLoadingTrace(null);
      };

      // Group failures by eval name for summary
      const evalGroups = {};
      failures.forEach(f => {
        [...(f.failedCodeEvals || []), ...(f.failedJudgeEvals || [])].forEach(evalName => {
          if (!evalGroups[evalName]) evalGroups[evalName] = [];
          evalGroups[evalName].push(f.caseId);
        });
      });

      // Helper: highlight problematic parts in response text
      const highlightIssue = (reply, evalName, detail) => {
        if (!reply) return null;
        let snippetStart = 0;
        let snippetEnd = Math.min(reply.length, 400);
        let highlightText = null;
        let explanation = detail || '';

        // For different eval types, find the relevant part of the response
        if (evalName === 'required_terms') {
          // The issue is what's MISSING — show the full response (truncated) and note the absence
          return { snippet: reply.slice(0, 500), highlight: null, note: 'No DRP/settlement/program mention found anywhere in the response.' };
        }
        if (evalName === 'segment_isolation') {
          const forbidden = detail?.match(/"([^"]+)" found/)?.[1];
          if (forbidden) {
            const idx = reply.toLowerCase().indexOf(forbidden.toLowerCase());
            if (idx >= 0) {
              snippetStart = Math.max(0, idx - 80);
              snippetEnd = Math.min(reply.length, idx + forbidden.length + 80);
              return { snippet: reply.slice(snippetStart, snippetEnd), highlight: forbidden, note: `Forbidden term "${forbidden}" appears in the response.` };
            }
          }
        }
        if (evalName === 'ineligibility_secrecy') {
          const leaked = detail?.match(/"([^"]+)"/)?.[1];
          if (leaked) {
            const idx = reply.toLowerCase().indexOf(leaked.toLowerCase());
            if (idx >= 0) {
              snippetStart = Math.max(0, idx - 80);
              snippetEnd = Math.min(reply.length, idx + leaked.length + 80);
              return { snippet: reply.slice(snippetStart, snippetEnd), highlight: leaked, note: `Eligibility language "${leaked}" leaked to ineligible user.` };
            }
          }
        }
        if (evalName === 'follow_up_quality' || evalName === 'followup_naturalness') {
          return { snippet: null, highlight: null, note: explanation, isFollowUpIssue: true };
        }
        if (evalName === 'drp_data_richness') {
          // Find lender mentions without amounts
          const lenderRe = /\b([A-Z][A-Za-z&.\-]*(?:\s+(?:and|[A-Z][A-Za-z&.\-]*)){0,5}\s+(?:Bank|Finance|Financial|Capital|Ltd|Limited|Pvt|Services))\b/g;
          const lenders = [...reply.matchAll(lenderRe)].map(m => m[1]);
          const withoutAmounts = lenders.filter(l => {
            const idx = reply.indexOf(l);
            const nearby = reply.slice(idx, idx + l.length + 150);
            return !/₹[\d,]+/.test(nearby);
          });
          if (withoutAmounts.length > 0) {
            return { snippet: reply.slice(0, 500), highlight: withoutAmounts[0], note: `Lender "${withoutAmounts[0]}" mentioned without accompanying numerical data (₹ amount).` };
          }
        }
        if (evalName === 'response_dedup') {
          return { snippet: reply.slice(0, 400), highlight: null, note: 'High content overlap with prior response turns. Most bullet points repeat from earlier responses.' };
        }
        if (evalName === 'credit_score_accuracy') {
          const wrongScore = detail?.match(/Response says (\d+)/)?.[1];
          if (wrongScore) {
            const idx = reply.indexOf(wrongScore);
            if (idx >= 0) {
              snippetStart = Math.max(0, idx - 60);
              snippetEnd = Math.min(reply.length, idx + wrongScore.length + 60);
              return { snippet: reply.slice(snippetStart, snippetEnd), highlight: wrongScore, note: detail };
            }
          }
        }
        // Generic fallback
        return { snippet: reply.slice(0, 400), highlight: null, note: explanation };
      };

      return (
        <div className="rounded-xl border overflow-hidden" style={{ background: '#0d1526', borderColor: '#1e293b' }}>
          <div className="px-5 py-3 border-b border-slate-800 flex items-center justify-between">
            <h3 className="text-sm font-semibold text-slate-300">Failure Analysis</h3>
            <div className="flex items-center gap-3">
              <span className="text-xs text-slate-500">{failures.length} failed cases</span>
              <div className="flex gap-1.5">
                {Object.entries(evalGroups).map(([evalName, caseIds]) => (
                  <span key={evalName} className="px-1.5 py-0.5 rounded text-[10px] font-mono border"
                    style={{ background: 'rgba(239,68,68,0.06)', color: '#f87171', borderColor: 'rgba(239,68,68,0.15)' }}>
                    {evalName} ({caseIds.length})
                  </span>
                ))}
              </div>
            </div>
          </div>

          <div>
            {failures.map((f, i) => {
              const isExpanded = expandedId === f.caseId;
              const trace = traceCache[f.caseId];
              const isLoading = loadingTrace === f.caseId;
              const allFailedEvals = [...(f.failedCodeEvals || []), ...(f.failedJudgeEvals || [])];

              return (
                <div key={i} className={`border-b border-slate-800/40 last:border-0 ${isExpanded ? 'bg-slate-900/30' : ''}`}>
                  {/* Summary row */}
                  <button onClick={() => loadTrace(f.caseId)}
                    className="w-full text-left px-5 py-3 flex items-center gap-4 hover:bg-slate-800/20 transition-colors">
                    <StatusDot passed={false} />
                    <span className="font-mono text-xs text-sky-400 w-48 truncate flex-shrink-0">{f.caseId}</span>
                    <SegmentBadge seg={f.segment} />
                    <span className="text-xs text-slate-500 w-24 truncate flex-shrink-0">{f.userName}</span>
                    <div className="flex-1 flex gap-1.5">
                      {allFailedEvals.map(e => (
                        <span key={e} className="px-1.5 py-0.5 rounded text-[10px] font-mono border"
                          style={{ background: 'rgba(239,68,68,0.06)', color: '#f87171', borderColor: 'rgba(239,68,68,0.15)' }}>
                          {e}
                        </span>
                      ))}
                    </div>
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none"
                      className={`text-slate-600 transition-transform flex-shrink-0 ${isExpanded ? 'rotate-180' : ''}`}>
                      <path d="M2.5 4.5l3.5 3 3.5-3" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>
                  </button>

                  {/* Expanded analysis */}
                  {isExpanded && (
                    <div className="px-5 pb-5 space-y-4">
                      {isLoading && (
                        <div className="flex items-center gap-2 py-4 text-xs text-slate-500">
                          <span className="spinner" /> Loading trace data...
                        </div>
                      )}

                      {trace && trace.turns?.map((turn, ti) => {
                        const turnFailedEvals = (turn.codeEvals || []).filter(e => !e.passed);
                        if (turnFailedEvals.length === 0 && ti > 0) return null;
                        const reply = turn.response?.reply || '';

                        return (
                          <div key={ti} className="space-y-3">
                            {/* User message */}
                            <div className="flex items-start gap-3">
                              <span className="text-[10px] font-medium text-slate-600 w-12 pt-1 flex-shrink-0 text-right">USER</span>
                              <div className="text-xs text-slate-400 bg-slate-800/40 px-3 py-2 rounded-lg">{turn.userMessage}</div>
                            </div>

                            {/* Per-eval failure analysis */}
                            {turnFailedEvals.map((failedEval, fi) => {
                              const analysis = highlightIssue(reply, failedEval.evalName, failedEval.details);

                              return (
                                <div key={fi} className="rounded-lg border p-4 space-y-3" style={{ background: 'rgba(127,29,29,0.08)', borderColor: 'rgba(239,68,68,0.15)' }}>
                                  {/* Eval name + diagnosis */}
                                  <div className="flex items-start gap-3">
                                    <span className="px-2 py-0.5 rounded text-[10px] font-mono font-semibold border flex-shrink-0"
                                      style={{ background: 'rgba(239,68,68,0.1)', color: '#f87171', borderColor: 'rgba(239,68,68,0.25)' }}>
                                      FAIL: {failedEval.evalName}
                                    </span>
                                    <span className="text-xs text-red-300 leading-relaxed">{analysis?.note}</span>
                                  </div>

                                  {/* Response snippet with highlight */}
                                  {analysis?.snippet && (
                                    <div className="space-y-1.5">
                                      <div className="text-[10px] font-medium text-slate-600 uppercase tracking-wider">Response excerpt</div>
                                      <div className="text-xs leading-relaxed px-3 py-2.5 rounded-lg font-mono" style={{ background: '#080d1a', color: '#94a3b8' }}>
                                        {analysis.highlight ? (
                                          (() => {
                                            const idx = analysis.snippet.toLowerCase().indexOf(analysis.highlight.toLowerCase());
                                            if (idx === -1) return analysis.snippet;
                                            return (
                                              <>
                                                {analysis.snippet.slice(0, idx)}
                                                <span className="px-0.5 rounded" style={{ background: 'rgba(239,68,68,0.25)', color: '#fca5a5', textDecoration: 'underline', textDecorationColor: '#ef4444' }}>
                                                  {analysis.snippet.slice(idx, idx + analysis.highlight.length)}
                                                </span>
                                                {analysis.snippet.slice(idx + analysis.highlight.length)}
                                              </>
                                            );
                                          })()
                                        ) : (
                                          analysis.snippet
                                        )}
                                        {analysis.snippet.length < reply.length && <span className="text-slate-600"> ...</span>}
                                      </div>
                                    </div>
                                  )}

                                  {/* Follow-up issues */}
                                  {analysis?.isFollowUpIssue && turn.response?.followUps && (
                                    <div className="space-y-1.5">
                                      <div className="text-[10px] font-medium text-slate-600 uppercase tracking-wider">Follow-ups generated</div>
                                      <div className="space-y-1">
                                        {turn.response.followUps.map((fu, j) => {
                                          const isProblematic = (failedEval.details || '').includes(fu);
                                          return (
                                            <div key={j} className={`text-xs px-3 py-1.5 rounded-lg font-mono ${isProblematic ? 'border' : ''}`}
                                              style={isProblematic
                                                ? { background: 'rgba(239,68,68,0.08)', borderColor: 'rgba(239,68,68,0.2)', color: '#fca5a5' }
                                                : { background: '#080d1a', color: '#64748b' }
                                              }>
                                              {isProblematic && <span className="text-red-400 mr-1.5">-</span>}
                                              "{fu}"
                                            </div>
                                          );
                                        })}
                                      </div>
                                    </div>
                                  )}

                                  {/* What should have happened */}
                                  <div className="text-[10px] text-slate-600 pt-1 border-t border-slate-800/40">
                                    <span className="font-medium text-slate-500">Expected: </span>
                                    {failedEval.evalName === 'required_terms' && 'Response should mention DRP, debt resolution, settlement, or FREED\'s program for this segment + intent combination.'}
                                    {failedEval.evalName === 'segment_isolation' && 'Response must not contain program terms that belong to other segments.'}
                                    {failedEval.evalName === 'ineligibility_secrecy' && 'Response must not reveal that eligibility assessment occurred. Use neutral language.'}
                                    {failedEval.evalName === 'follow_up_quality' && 'Exactly 3 follow-ups required, 8-100 chars each, no generic patterns.'}
                                    {failedEval.evalName === 'followup_naturalness' && 'Follow-ups should use conversational phrasing, not robotic template patterns.'}
                                    {failedEval.evalName === 'drp_data_richness' && '50%+ of lender mentions in settlement context should include numerical data (outstanding amounts).'}
                                    {failedEval.evalName === 'response_dedup' && 'Each turn should add new value. Avoid repeating 40%+ of content from prior turns.'}
                                    {failedEval.evalName === 'credit_score_accuracy' && 'Credit score in response must exactly match the grounding data value.'}
                                    {!['required_terms','segment_isolation','ineligibility_secrecy','follow_up_quality','followup_naturalness','drp_data_richness','response_dedup','credit_score_accuracy'].includes(failedEval.evalName) && (failedEval.details || 'Eval criteria not met.')}
                                  </div>
                                </div>
                              );
                            })}

                            {/* Passed evals summary */}
                            {turn.codeEvals && (
                              <div className="flex items-center gap-2 pt-1">
                                <span className="text-[10px] text-slate-600">{turn.codeEvals.filter(e => e.passed).length} passed</span>
                                <div className="flex gap-1 flex-wrap">
                                  {turn.codeEvals.filter(e => e.passed).slice(0, 12).map(e => (
                                    <span key={e.evalName} className="px-1 py-0.5 rounded text-[9px]"
                                      style={{ background: 'rgba(34,197,94,0.06)', color: '#4ade80' }}>
                                      {e.evalName.replace(/_/g, ' ')}
                                    </span>
                                  ))}
                                  {turn.codeEvals.filter(e => e.passed).length > 12 && (
                                    <span className="text-[9px] text-slate-600">+{turn.codeEvals.filter(e => e.passed).length - 12}</span>
                                  )}
                                </div>
                              </div>
                            )}
                          </div>
                        );
                      })}

                      {trace && !trace.turns?.length && (
                        <div className="text-xs text-slate-600 py-2">No turn data available. Run the eval to generate trace data.</div>
                      )}

                      {!trace && !isLoading && (
                        <div className="text-xs text-slate-600 py-2">Trace data not available for this case.</div>
                      )}

                      {/* Quick action */}
                      <button onClick={() => onGoToTrace(f.caseId)}
                        className="text-xs text-sky-400 hover:text-sky-300 transition-colors flex items-center gap-1.5">
                        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M4.5 2l4 4-4 4" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                        View full trace
                      </button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ── Overview Tab ─────────────────────────────────────────────────────────────
    function OverviewTab({ report, onRunEvals, running, onGoToTrace }) {
      if (!report) {
        return (
          <div className="flex flex-col items-center justify-center py-24 gap-5">
            <div className="w-12 h-12 rounded-xl border border-slate-700 flex items-center justify-center">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#475569" strokeWidth="1.5">
                <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 012-2h2a2 2 0 012 2M9 5h6M9 14l2 2 4-4"/>
              </svg>
            </div>
            <div className="text-center">
              <p className="text-slate-300 font-medium">No eval reports yet</p>
              <p className="text-slate-500 text-sm mt-1">Run an eval suite to see results</p>
            </div>
            <div className="flex gap-2">
              <button onClick={() => onRunEvals('full')} disabled={running}
                className="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium bg-sky-600 hover:bg-sky-500 disabled:opacity-50 transition-colors">
                {running ? <><span className="spinner" /> Running...</> : 'Run Full Eval'}
              </button>
              <button onClick={() => onRunEvals('code')} disabled={running}
                className="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium border border-slate-600 text-slate-300 hover:border-slate-500 hover:text-slate-200 disabled:opacity-50 transition-colors">
                Code Only
              </button>
            </div>
          </div>
        );
      }

      const codeEntries = Object.entries(report.codeEvals || {});
      const judgeEntries = Object.entries(report.llmJudge || {});
      const allEvals = [...codeEntries, ...judgeEntries];

      // Collect recent failures
      const failures = (report.failures || []).slice(0, 8);

      const overallRate = parseFloat(report.overallRate);

      return (
        <div className="space-y-5">
          {/* Action bar */}
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-2 text-xs text-slate-500">
              <span>Last run:</span>
              <span className="text-slate-400">{formatDate(report.timestamp)}</span>
            </div>
            <div className="flex gap-2">
              <button onClick={() => onRunEvals('full')} disabled={running}
                className="flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm font-medium bg-sky-600 hover:bg-sky-500 disabled:opacity-50 transition-colors">
                {running ? <><span className="spinner" /> Running...</> : 'Run Full Eval'}
              </button>
              <button onClick={() => onRunEvals('code')} disabled={running}
                className="flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm font-medium border border-slate-700 text-slate-300 hover:border-slate-600 hover:text-slate-200 disabled:opacity-50 transition-colors">
                Code Only
              </button>
            </div>
          </div>

          {/* Regression banner */}
          {report.regressions?.length > 0 && (
            <div className="flex items-center gap-3 px-4 py-2.5 rounded-lg border border-amber-700/40 bg-amber-950/30 text-sm text-amber-300">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none" className="flex-shrink-0">
                <path d="M8 1l7 13H1L8 1z" fill="rgba(234,179,8,0.15)" stroke="#eab308" strokeWidth="1.5"/>
                <path d="M8 6v3M8 11v1" stroke="#eab308" strokeWidth="1.5" strokeLinecap="round"/>
              </svg>
              <span>{report.regressions.length} regression{report.regressions.length > 1 ? 's' : ''} detected: {report.regressions.map(r => r.message || r).join(', ')}</span>
            </div>
          )}

          {/* Stat cards */}
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
            {[
              { label: 'Total Cases', value: report.totalCases, color: '#38bdf8' },
              { label: 'Passed', value: report.passedCases, color: '#22c55e' },
              { label: 'Failed', value: report.failedCases, color: '#ef4444' },
              { label: 'Pass Rate', value: report.overallRate, color: passColor(report.overallRate) },
            ].map(c => (
              <div key={c.label} className="rounded-xl border p-4 text-center" style={{ background: '#0d1526', borderColor: '#1e293b' }}>
                <div className="text-2xl font-bold" style={{ color: c.color }}>{c.value}</div>
                <div className="text-xs text-slate-500 mt-1 font-medium uppercase tracking-wider">{c.label}</div>
              </div>
            ))}
          </div>

          {/* Eval breakdown — horizontal progress bars */}
          {allEvals.length > 0 && (
            <div className="rounded-xl border p-5 space-y-4" style={{ background: '#0d1526', borderColor: '#1e293b' }}>
              <h3 className="text-sm font-semibold text-slate-300">Eval Breakdown</h3>
              <div className="space-y-3">
                {allEvals.map(([cat, s]) => {
                  const total = (s.passed || 0) + (s.failed || 0);
                  const rate = total > 0 ? Math.round((s.passed / total) * 100) : 0;
                  const fillColor = rate >= 85 ? '#22c55e' : rate >= 65 ? '#eab308' : '#ef4444';
                  return (
                    <div key={cat} className="flex items-center gap-3">
                      <div className="w-40 text-xs text-slate-400 truncate flex-shrink-0">{cat.replace(/_/g, ' ')}</div>
                      <div className="flex-1 progress-track h-2">
                        <div className="progress-fill" style={{ width: `${rate}%`, background: fillColor }} />
                      </div>
                      <div className="w-16 text-right text-xs font-medium" style={{ color: fillColor }}>{rate}%</div>
                      <div className="w-14 text-right text-[11px] text-slate-500">{s.passed}/{total}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Failure Analysis */}
          {failures.length > 0 && (
            <FailureAnalysis failures={failures} onGoToTrace={onGoToTrace} />
          )}
        </div>
      );
    }

    // ── Add/Edit Modal ────────────────────────────────────────────────────────────
    function AddEditModal({ editCase, users, segments, intents, onSave, onClose, showToast, existingCount }) {
      const isEdit = !!editCase;
      const [saving, setSaving] = useState(false);
      const [userSearch, setUserSearch] = useState(editCase ? (editCase.userName || editCase.user || '') : '');
      const [showDropdown, setShowDropdown] = useState(false);
      const [form, setForm] = useState({
        user: editCase?.user || '',
        userName: editCase?.userName || '',
        segment: editCase?.segment || '',
        message: editCase?.turns?.[0]?.userMessage || '',
        intent: editCase?.turns?.[0]?.intentTag || '',
        expectedBehaviors: (editCase?.expectedBehaviors || []).join('\n'),
      });

      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

      const filteredUsers = useMemo(() => {
        if (!userSearch || !users) return [];
        const q = userSearch.toLowerCase();
        return users.filter(u =>
          (u.firstName + ' ' + u.lastName).toLowerCase().includes(q) ||
          (u.leadRefId || '').toLowerCase().includes(q) ||
          (u.segment || '').toLowerCase().includes(q)
        ).slice(0, 12);
      }, [users, userSearch]);

      const selectUser = (u) => {
        set('user', u.leadRefId);
        set('userName', `${u.firstName} ${u.lastName}`);
        set('segment', u.segment);
        setUserSearch(`${u.firstName} ${u.lastName}`);
        setShowDropdown(false);
      };

      const handleSave = async () => {
        if (!form.user) { showToast('Select a user', 'error'); return; }
        if (!form.message.trim()) { showToast('Enter a message', 'error'); return; }
        if (!form.expectedBehaviors.trim()) { showToast('Add expected behaviors', 'error'); return; }

        const behaviors = form.expectedBehaviors.split('\n').map(b => b.trim()).filter(Boolean);
        const segShort = (form.segment || 'unknown').toLowerCase().replace(/_/g, '-').replace('eligible', 'elig').replace('ineligible', 'inelig');
        const intent = form.intent ? form.intent.replace('INTENT_', '').toLowerCase().replace(/_/g, '-').substring(0, 12) : 'gen';
        const counter = String((isEdit ? 0 : existingCount) + 1).padStart(3, '0');
        const id = isEdit ? editCase.id : `${segShort}-${intent}-${counter}`;

        const tc = {
          id,
          user: form.user,
          userName: form.userName,
          segment: form.segment,
          turns: [{ userMessage: form.message.trim(), intentTag: form.intent, messageCount: 1 }],
          expectedBehaviors: behaviors,
          source: isEdit ? (editCase.source || 'manual') : 'manual',
          createdAt: isEdit ? editCase.createdAt : new Date().toISOString(),
        };

        setSaving(true);
        try {
          await onSave(tc);
          onClose();
        } catch (e) {
          showToast(e.message || 'Save failed', 'error');
        }
        setSaving(false);
      };

      return (
        <div className="fixed inset-0 z-40 flex items-center justify-center p-4" style={{ background: 'rgba(0,0,0,0.7)', backdropFilter: 'blur(4px)' }}>
          <div className="w-full max-w-lg rounded-xl border p-6 space-y-4" style={{ background: '#0d1526', borderColor: '#1e293b' }}>
            <div className="flex items-center justify-between">
              <h3 className="font-semibold text-slate-200">{isEdit ? 'Edit Test Case' : 'Add Test Case'}</h3>
              <button onClick={onClose} className="text-slate-500 hover:text-slate-300 text-xl leading-none">&times;</button>
            </div>

            {/* User search */}
            <div className="relative">
              <label className="text-xs text-slate-400 font-medium uppercase tracking-wider block mb-1.5">User</label>
              <input
                type="text"
                value={userSearch}
                onChange={e => { setUserSearch(e.target.value); setShowDropdown(true); }}
                onFocus={() => setShowDropdown(true)}
                placeholder="Search by name, ID, or segment..."
                className="w-full px-3 py-2 rounded-lg text-sm"
              />
              {showDropdown && filteredUsers.length > 0 && (
                <div className="autocomplete-dropdown">
                  {filteredUsers.map(u => (
                    <button key={u.leadRefId} onMouseDown={() => selectUser(u)}
                      className="w-full text-left px-3 py-2 text-sm hover:bg-slate-800/60 flex items-center justify-between border-b border-slate-800/40 last:border-0">
                      <div className="flex items-center gap-2">
                        <span className="text-slate-200">{u.firstName} {u.lastName}</span>
                        <SegmentBadge seg={u.segment} />
                      </div>
                      <span className="text-xs text-slate-500 font-mono">{u.leadRefId}</span>
                    </button>
                  ))}
                </div>
              )}
              {form.user && (
                <div className="mt-1.5 flex items-center gap-2 text-xs text-slate-400">
                  <span className="text-green-400">✓</span>
                  <span>{form.user}</span>
                  {form.segment && <SegmentBadge seg={form.segment} />}
                </div>
              )}
            </div>

            {/* Message */}
            <div>
              <label className="text-xs text-slate-400 font-medium uppercase tracking-wider block mb-1.5">User Message</label>
              <textarea
                value={form.message}
                onChange={e => set('message', e.target.value)}
                rows={3}
                placeholder="What the user says to the chatbot..."
                className="w-full px-3 py-2 rounded-lg text-sm resize-none"
              />
            </div>

            {/* Intent */}
            <div>
              <label className="text-xs text-slate-400 font-medium uppercase tracking-wider block mb-1.5">Intent</label>
              <select value={form.intent} onChange={e => set('intent', e.target.value)}
                className="w-full px-3 py-2 rounded-lg text-sm">
                <option value="">— Select intent —</option>
                {(intents || []).map(i => (
                  <option key={i} value={i}>{i.replace('INTENT_', '').replace(/_/g, ' ')}</option>
                ))}
              </select>
            </div>

            {/* Expected behaviors */}
            <div>
              <label className="text-xs text-slate-400 font-medium uppercase tracking-wider block mb-1.5">Expected Behaviors <span className="text-slate-600 font-normal normal-case">(one per line)</span></label>
              <textarea
                value={form.expectedBehaviors}
                onChange={e => set('expectedBehaviors', e.target.value)}
                rows={4}
                placeholder={"greets user by first name\ndoes NOT mention DCP or DEP\nmentions DRP or debt resolution"}
                className="w-full px-3 py-2 rounded-lg text-sm resize-none font-mono text-xs"
              />
            </div>

            <div className="flex gap-2 pt-1">
              <button onClick={handleSave} disabled={saving}
                className="flex-1 flex items-center justify-center gap-2 px-4 py-2 rounded-lg text-sm font-medium bg-sky-600 hover:bg-sky-500 disabled:opacity-50 transition-colors">
                {saving ? <><span className="spinner" /> Saving...</> : (isEdit ? 'Save Changes' : 'Add Test Case')}
              </button>
              <button onClick={onClose} className="px-4 py-2 rounded-lg text-sm font-medium border border-slate-700 text-slate-400 hover:border-slate-600 hover:text-slate-300 transition-colors">
                Cancel
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ── Test Cases Tab ────────────────────────────────────────────────────────────
    function TestCasesTab({ cases, segments, intents, users, onRefresh, showToast, report, onGoToTrace }) {
      const [segFilter, setSegFilter] = useState('');
      const [statusFilter, setStatusFilter] = useState('');
      const [search, setSearch] = useState('');
      const [showModal, setShowModal] = useState(false);
      const [editCase, setEditCase] = useState(null);
      const [runningId, setRunningId] = useState(null);
      const [deletingId, setDeletingId] = useState(null);

      const resultMap = useMemo(() => {
        const m = {};
        const failedIds = new Set((report?.failures || []).map(f => f.caseId));
        (cases || []).forEach(c => { m[c.id] = { passed: !failedIds.has(c.id) }; });
        return m;
      }, [report, cases]);

      const filtered = useMemo(() => {
        return (cases || []).filter(c => {
          if (segFilter && !(c.segment || '').toLowerCase().includes(segFilter.toLowerCase())) return false;
          if (statusFilter) {
            const r = resultMap[c.id];
            if (statusFilter === 'pass' && !(r?.passed === true)) return false;
            if (statusFilter === 'fail' && !(r?.passed === false)) return false;
            if (statusFilter === 'untested' && r) return false;
          }
          if (search) {
            const q = search.toLowerCase();
            return (c.id || '').toLowerCase().includes(q) ||
              (c.userName || c.user || '').toLowerCase().includes(q) ||
              (c.segment || '').toLowerCase().includes(q) ||
              (c.turns?.[0]?.intentTag || '').toLowerCase().includes(q);
          }
          return true;
        });
      }, [cases, segFilter, statusFilter, search, resultMap]);

      // Coverage counts
      const coverage = useMemo(() => {
        const counts = {};
        (segments || []).forEach(s => { counts[s] = 0; });
        (cases || []).forEach(c => {
          const seg = (c.segment || 'Others');
          counts[seg] = (counts[seg] || 0) + 1;
        });
        return counts;
      }, [cases, segments]);

      const handleSave = async (tc) => {
        if (editCase) {
          await apiCall(`/dataset/${tc.id}`, { method: 'PUT', body: JSON.stringify(tc) });
          showToast('Test case updated', 'success');
        } else {
          await apiCall('/dataset', { method: 'POST', body: JSON.stringify(tc) });
          showToast('Test case added', 'success');
        }
        await onRefresh();
        setShowModal(false);
        setEditCase(null);
      };

      const handleDelete = async (id) => {
        if (!confirm(`Delete test case "${id}"?`)) return;
        setDeletingId(id);
        try {
          await apiCall(`/dataset/${id}`, { method: 'DELETE' });
          showToast('Deleted', 'success');
          await onRefresh();
        } catch (e) {
          showToast(e.message, 'error');
        }
        setDeletingId(null);
      };

      const handleRunSingle = async (id) => {
        setRunningId(id);
        try {
          const res = await apiCall(`/run/single/${id}`, { method: 'POST' });
          showToast(`${id}: ${res.result?.passed ? 'PASSED' : 'FAILED'}`, res.result?.passed ? 'success' : 'error');
          await onRefresh();
        } catch (e) {
          showToast(e.message, 'error');
        }
        setRunningId(null);
      };

      const segmentKeys = useMemo(() => {
        const keys = new Set();
        (cases || []).forEach(c => c.segment && keys.add(c.segment));
        return [...keys].sort();
      }, [cases]);

      return (
        <div className="space-y-4">
          {showModal && (
            <AddEditModal
              editCase={editCase}
              users={users}
              segments={segments}
              intents={intents}
              onSave={handleSave}
              onClose={() => { setShowModal(false); setEditCase(null); }}
              showToast={showToast}
              existingCount={cases?.length || 0}
            />
          )}

          {/* Coverage bar */}
          {Object.keys(coverage).length > 0 && (
            <div className="flex flex-wrap items-center gap-3 px-4 py-2.5 rounded-lg border text-xs" style={{ background: '#0d1526', borderColor: '#1e293b' }}>
              <span className="text-slate-500 font-medium">Coverage:</span>
              {Object.entries(coverage).map(([seg, cnt]) => {
                const c = segmentColor(seg);
                return (
                  <span key={seg} className="font-medium" style={{ color: c.text }}>
                    {seg} {cnt}
                  </span>
                );
              })}
              <span className="ml-auto text-slate-500">{cases?.length || 0} total</span>
            </div>
          )}

          {/* Filters + Add button */}
          <div className="flex flex-wrap gap-2 items-center">
            <input
              type="text"
              value={search}
              onChange={e => setSearch(e.target.value)}
              placeholder="Search cases..."
              className="px-3 py-1.5 rounded-lg text-sm w-48"
            />
            <select value={segFilter} onChange={e => setSegFilter(e.target.value)}
              className="px-3 py-1.5 rounded-lg text-sm">
              <option value="">All Segments</option>
              {segmentKeys.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
            <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)}
              className="px-3 py-1.5 rounded-lg text-sm">
              <option value="">All Status</option>
              <option value="pass">Pass</option>
              <option value="fail">Fail</option>
              <option value="untested">Untested</option>
            </select>
            <div className="ml-auto">
              <button onClick={() => { setEditCase(null); setShowModal(true); }}
                className="flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm font-medium bg-sky-600 hover:bg-sky-500 transition-colors">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2v10M2 7h10" stroke="white" strokeWidth="1.5" strokeLinecap="round"/></svg>
                Add Case
              </button>
            </div>
          </div>

          {/* Table */}
          <div className="rounded-xl border overflow-hidden" style={{ background: '#0d1526', borderColor: '#1e293b' }}>
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead>
                  <tr className="border-b border-slate-800">
                    <th className="text-left px-4 py-2.5 text-[11px] font-medium text-slate-500 uppercase tracking-wider w-8"></th>
                    <th className="text-left px-4 py-2.5 text-[11px] font-medium text-slate-500 uppercase tracking-wider">ID</th>
                    <th className="text-left px-4 py-2.5 text-[11px] font-medium text-slate-500 uppercase tracking-wider">Segment</th>
                    <th className="text-left px-4 py-2.5 text-[11px] font-medium text-slate-500 uppercase tracking-wider">User</th>
                    <th className="text-left px-4 py-2.5 text-[11px] font-medium text-slate-500 uppercase tracking-wider">Turns</th>
                    <th className="text-left px-4 py-2.5 text-[11px] font-medium text-slate-500 uppercase tracking-wider hidden lg:table-cell">Intent</th>
                    <th className="text-right px-4 py-2.5 text-[11px] font-medium text-slate-500 uppercase tracking-wider">Actions</th>
                  </tr>
                </thead>
                <tbody>
                  {filtered.map(c => {
                    const result = resultMap[c.id];
                    const isRunning = runningId === c.id;
                    const isDeleting = deletingId === c.id;
                    const intent = c.turns?.[0]?.intentTag || '';
                    return (
                      <tr key={c.id} className="border-b border-slate-800/40 hover:bg-slate-800/20 transition-colors">
                        <td className="px-4 py-3">
                          <StatusDot passed={result ? result.passed : undefined} />
                        </td>
                        <td className="px-4 py-3 font-mono text-xs text-sky-400 whitespace-nowrap">{c.id}</td>
                        <td className="px-4 py-3"><SegmentBadge seg={c.segment} /></td>
                        <td className="px-4 py-3 text-slate-300 text-xs">{c.userName || c.user}</td>
                        <td className="px-4 py-3 text-slate-400 text-xs text-center">{c.turns?.length || 1}</td>
                        <td className="px-4 py-3 text-slate-500 text-xs hidden lg:table-cell">
                          {intent ? intent.replace('INTENT_', '').replace(/_/g, ' ') : '—'}
                        </td>
                        <td className="px-4 py-3">
                          <div className="flex items-center justify-end gap-1">
                            <button onClick={() => handleRunSingle(c.id)} disabled={!!runningId}
                              className="p-1.5 rounded hover:bg-slate-700 text-slate-400 hover:text-sky-400 transition-colors disabled:opacity-40"
                              title="Run single">
                              {isRunning ? <span className="spinner" /> : (
                                <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M5 3l9 5-9 5V3z" fill="currentColor"/></svg>
                              )}
                            </button>
                            <button onClick={() => result && onGoToTrace(c.id)} disabled={!result}
                              className="p-1.5 rounded hover:bg-slate-700 text-slate-400 hover:text-emerald-400 transition-colors disabled:opacity-30"
                              title="View trace">
                              <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                            </button>
                            <button onClick={() => { setEditCase(c); setShowModal(true); }}
                              className="p-1.5 rounded hover:bg-slate-700 text-slate-400 hover:text-slate-200 transition-colors"
                              title="Edit">
                              <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M11.5 2.5l2 2-9 9H2.5v-2l9-9z" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/></svg>
                            </button>
                            <button onClick={() => handleDelete(c.id)} disabled={isDeleting}
                              className="p-1.5 rounded hover:bg-slate-700 text-slate-500 hover:text-red-400 transition-colors disabled:opacity-40"
                              title="Delete">
                              {isDeleting ? <span className="spinner" /> : (
                                <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 4h10M6 4V3h4v1M5 4v9h6V4H5z" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/></svg>
                              )}
                            </button>
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                  {filtered.length === 0 && (
                    <tr>
                      <td colSpan={7} className="px-4 py-10 text-center text-slate-500 text-sm">
                        {cases?.length === 0 ? 'No test cases yet. Add one above.' : 'No cases match your filters.'}
                      </td>
                    </tr>
                  )}
                </tbody>
              </table>
            </div>
          </div>
          <p className="text-xs text-slate-600 text-right">{filtered.length} of {cases?.length || 0} cases</p>
        </div>
      );
    }

    // ── Traces Tab ────────────────────────────────────────────────────────────────
    function TracesTab({ cases, report, initialTraceId }) {
      const [selectedId, setSelectedId] = useState(initialTraceId || null);
      const [trace, setTrace] = useState(null);
      const [result, setResult] = useState(null);
      const [loading, setLoading] = useState(false);
      const [listSearch, setListSearch] = useState('');

      const resultMap = useMemo(() => {
        const m = {};
        const failedIds = new Set((report?.failures || []).map(f => f.caseId));
        (cases || []).forEach(c => { m[c.id] = { passed: !failedIds.has(c.id) }; });
        return m;
      }, [report, cases]);

      useEffect(() => {
        if (initialTraceId) setSelectedId(initialTraceId);
      }, [initialTraceId]);

      useEffect(() => {
        if (!selectedId) return;
        setLoading(true);
        setTrace(null);
        setResult(null);
        apiCall(`/traces/${selectedId}`)
          .then(d => { setTrace(d.trace); setResult(d.result); })
          .catch(() => {})
          .finally(() => setLoading(false));
      }, [selectedId]);

      const filteredCases = useMemo(() => {
        const q = listSearch.toLowerCase();
        return (cases || []).filter(c =>
          !q || (c.id || '').toLowerCase().includes(q) || (c.segment || '').toLowerCase().includes(q)
        );
      }, [cases, listSearch]);

      return (
        <div className="flex gap-0 h-[calc(100vh-160px)] min-h-96 rounded-xl border overflow-hidden" style={{ borderColor: '#1e293b' }}>
          {/* Left sidebar */}
          <div className="w-56 flex-shrink-0 border-r flex flex-col" style={{ background: '#0d1526', borderColor: '#1e293b' }}>
            <div className="p-2 border-b" style={{ borderColor: '#1e293b' }}>
              <input
                type="text"
                value={listSearch}
                onChange={e => setListSearch(e.target.value)}
                placeholder="Filter cases..."
                className="w-full px-2.5 py-1.5 rounded-lg text-xs"
              />
            </div>
            <div className="flex-1 overflow-y-auto">
              {filteredCases.map(c => {
                const r = resultMap[c.id];
                const isActive = c.id === selectedId;
                return (
                  <button key={c.id} onClick={() => setSelectedId(c.id)}
                    className={`w-full text-left px-3 py-2 flex items-center gap-2 text-xs border-b transition-colors ${isActive ? 'bg-sky-500/10 border-sky-500/20' : 'hover:bg-slate-800/30 border-slate-800/40'}`}>
                    <StatusDot passed={r ? r.passed : undefined} />
                    <span className={`font-mono truncate ${isActive ? 'text-sky-400' : 'text-slate-400'}`}>{c.id}</span>
                  </button>
                );
              })}
              {filteredCases.length === 0 && (
                <div className="py-8 text-center text-xs text-slate-600">No cases</div>
              )}
            </div>
          </div>

          {/* Right pane */}
          <div className="flex-1 flex flex-col overflow-hidden" style={{ background: '#080d1a' }}>
            {!selectedId ? (
              <div className="flex-1 flex items-center justify-center text-slate-600 text-sm">
                Select a case to view its trace
              </div>
            ) : loading ? (
              <div className="flex-1 flex items-center justify-center">
                <span className="spinner" style={{ width: 24, height: 24 }} />
              </div>
            ) : !trace ? (
              <div className="flex-1 flex items-center justify-center text-slate-600 text-sm">
                No trace available for this case. Run the eval first.
              </div>
            ) : (
              <div className="flex-1 overflow-y-auto p-5 space-y-4">
                {/* Header */}
                <div className="flex items-center gap-3 pb-3 border-b border-slate-800">
                  <span className="font-mono text-sm text-sky-400">{selectedId}</span>
                  {result && <StatusDot passed={result.passed} />}
                  {result && (
                    <span className="text-xs font-medium" style={{ color: result.passed ? '#22c55e' : '#ef4444' }}>
                      {result.passed ? 'PASSED' : 'FAILED'}
                    </span>
                  )}
                  <SegmentBadge seg={cases?.find(c => c.id === selectedId)?.segment} />
                </div>

                {/* Conversation from result.turns */}
                {result?.turns?.length > 0 ? (
                  <div className="space-y-4">
                    {result.turns.map((turn, i) => (
                      <div key={i} className="space-y-3">
                        {/* User message */}
                        <div className="flex justify-end">
                          <div className="max-w-[80%] rounded-xl rounded-br-sm px-4 py-3" style={{ background: '#1e293b' }}>
                            <div className="text-[10px] font-medium mb-1.5 text-slate-500">USER</div>
                            <div className="leading-relaxed whitespace-pre-wrap text-xs text-slate-300">{turn.userMessage}</div>
                          </div>
                        </div>
                        {/* Assistant response */}
                        {turn.response?.reply && (
                          <div className="flex justify-start">
                            <div className="max-w-[85%] rounded-xl rounded-bl-sm px-4 py-3 border" style={{ background: '#0d1526', borderColor: '#1e293b' }}>
                              <div className="text-[10px] font-medium mb-1.5 text-slate-500">ASSISTANT</div>
                              <div className="leading-relaxed whitespace-pre-wrap text-xs text-slate-200">{turn.response.reply}</div>
                              {turn.response.followUps?.length > 0 && (
                                <div className="mt-2 pt-2 border-t border-slate-800 flex flex-wrap gap-1.5">
                                  {turn.response.followUps.map((f, j) => (
                                    <span key={j} className="px-2 py-0.5 rounded text-[10px] border" style={{ background: 'rgba(56,189,248,0.06)', color: '#7dd3fc', borderColor: 'rgba(56,189,248,0.15)' }}>{f}</span>
                                  ))}
                                </div>
                              )}
                            </div>
                          </div>
                        )}
                        {/* Eval chips for this turn */}
                        {turn.codeEvals?.length > 0 && (
                          <div className="flex flex-wrap gap-1.5 pl-1">
                            {turn.codeEvals.map((e, j) => (
                              <span key={j} className="px-2 py-0.5 rounded-full text-[10px] font-medium border"
                                style={e.passed
                                  ? { background: 'rgba(34,197,94,0.06)', color: '#4ade80', borderColor: 'rgba(34,197,94,0.15)' }
                                  : { background: 'rgba(239,68,68,0.06)', color: '#f87171', borderColor: 'rgba(239,68,68,0.15)' }
                                }>
                                {e.passed ? '✓' : '✗'} {e.evalName?.replace(/_/g, ' ')}
                              </span>
                            ))}
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                ) : typeof trace === 'string' ? (
                  /* Fallback: show raw trace text */
                  <pre className="text-xs text-slate-400 leading-relaxed whitespace-pre-wrap font-mono p-4 rounded-lg border" style={{ background: '#080d1a', borderColor: '#1e293b' }}>{trace}</pre>
                ) : (
                  <div className="text-sm text-slate-600">No conversation data available</div>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ── LLM Judge Tab ──────────────────────────────────────────────────────────────
    function LLMJudgeTab({ showToast, report: latestReport }) {
      const [criteria, setCriteria] = useState([]);
      const [criteriaModel, setCriteriaModel] = useState('');
      const [loading, setLoading] = useState(true);
      const [editingId, setEditingId] = useState(null);
      const [editForm, setEditForm] = useState(null);
      const [showAdd, setShowAdd] = useState(false);
      const [addForm, setAddForm] = useState({
        id: '', name: '', description: '', prompt: '', category: 'custom', enabled: true,
        appliesWhen: { segments: ['*'], intents: ['*'], minTurn: 1 },
      });
      const [savingModel, setSavingModel] = useState(false);
      const [expandedEval, setExpandedEval] = useState(null);

      useEffect(() => {
        apiCall('/criteria').catch(() => ({ criteria: [], model: '' }))
          .then(c => { setCriteria(c.criteria || []); setCriteriaModel(c.model || ''); })
          .finally(() => setLoading(false));
      }, []);

      const ALL_SEGMENTS = ['DRP_Eligible', 'DRP_Ineligible', 'DCP_Eligible', 'DCP_Ineligible', 'DEP', 'NTC', 'Others'];
      const CATEGORIES = ['quality', 'accuracy', 'format', 'tone', 'custom'];

      const toggleCriterion = async (id) => {
        try {
          const d = await apiCall(`/criteria/${id}/toggle`, { method: 'PATCH' });
          setCriteria(c => c.map(x => x.id === id ? (d.criterion || { ...x, enabled: !x.enabled }) : x));
          showToast(`${(d.criterion || {}).name || 'Criterion'} ${(d.criterion || {}).enabled ? 'enabled' : 'disabled'}`, 'success');
        } catch (e) { showToast(e.message, 'error'); }
      };

      const deleteCriterion = async (id) => {
        try {
          await apiCall(`/criteria/${id}`, { method: 'DELETE' });
          setCriteria(c => c.filter(x => x.id !== id));
          showToast('Criterion deleted', 'success');
        } catch (e) { showToast(e.message, 'error'); }
      };

      const startEdit = (c) => { setEditingId(c.id); setEditForm({ ...c, appliesWhen: { ...c.appliesWhen } }); };
      const cancelEdit = () => { setEditingId(null); setEditForm(null); };

      const saveEdit = async () => {
        try {
          const d = await apiCall(`/criteria/${editingId}`, { method: 'PUT', body: JSON.stringify(editForm) });
          setCriteria(c => c.map(x => x.id === editingId ? (d.criterion || editForm) : x));
          showToast('Criterion updated', 'success');
          cancelEdit();
        } catch (e) { showToast(e.message, 'error'); }
      };

      const saveModel = async () => {
        setSavingModel(true);
        try {
          await apiCall('/criteria-config', { method: 'PUT', body: JSON.stringify({ model: criteriaModel }) });
          showToast(`Judge model set to ${criteriaModel}`, 'success');
        } catch (e) { showToast(e.message, 'error'); }
        setSavingModel(false);
      };

      const addCriterion = async () => {
        if (!addForm.id || !addForm.name || !addForm.prompt) {
          showToast('ID, name, and prompt are required', 'error'); return;
        }
        try {
          const d = await apiCall('/criteria', { method: 'POST', body: JSON.stringify(addForm) });
          setCriteria(c => [...c, d.criterion || addForm]);
          showToast('Criterion added', 'success');
          setShowAdd(false);
          setAddForm({ id: '', name: '', description: '', prompt: '', category: 'custom', enabled: true, appliesWhen: { segments: ['*'], intents: ['*'], minTurn: 1 } });
        } catch (e) { showToast(e.message, 'error'); }
      };

      // Group by category (must be before any conditional return for hooks rules)
      const categoryGroups = useMemo(() => {
        const g = {};
        criteria.forEach(c => {
          const cat = c.category || 'custom';
          if (!g[cat]) g[cat] = [];
          g[cat].push(c);
        });
        return g;
      }, [criteria]);

      const catDot = (cat) => {
        if (cat === 'quality') return '#38bdf8';
        if (cat === 'accuracy') return '#22c55e';
        if (cat === 'format') return '#eab308';
        if (cat === 'tone') return '#c084fc';
        return '#94a3b8';
      };

      if (loading) {
        return (
          <div className="flex items-center justify-center py-16">
            <span className="spinner" style={{ width: 24, height: 24 }} />
          </div>
        );
      }

      const CriterionForm = ({ form, setForm: setF, onSave, onCancel, saveLabel }) => (
        <div className="rounded-xl border p-5 space-y-4" style={{ background: '#0a0f1e', borderColor: 'rgba(56,189,248,0.2)' }}>
          <div className="grid grid-cols-2 gap-4">
            <div>
              <label className="text-[11px] text-slate-500 font-medium uppercase tracking-wider block mb-1">ID</label>
              <input value={form.id} onChange={e => setF({ ...form, id: e.target.value.toLowerCase().replace(/[^a-z0-9_]/g, '_') })}
                className="w-full px-3 py-2 rounded-lg text-xs" placeholder="e.g. my_criterion" disabled={saveLabel === 'Save'} />
            </div>
            <div>
              <label className="text-[11px] text-slate-500 font-medium uppercase tracking-wider block mb-1">Name</label>
              <input value={form.name} onChange={e => setF({ ...form, name: e.target.value })}
                className="w-full px-3 py-2 rounded-lg text-xs" placeholder="Display name" />
            </div>
          </div>
          <div>
            <label className="text-[11px] text-slate-500 font-medium uppercase tracking-wider block mb-1">Description</label>
            <input value={form.description || ''} onChange={e => setF({ ...form, description: e.target.value })}
              className="w-full px-3 py-2 rounded-lg text-xs" placeholder="One-line description" />
          </div>
          <div className="grid grid-cols-3 gap-4">
            <div>
              <label className="text-[11px] text-slate-500 font-medium uppercase tracking-wider block mb-1">Category</label>
              <select value={form.category || 'custom'} onChange={e => setF({ ...form, category: e.target.value })}
                className="w-full px-3 py-2 rounded-lg text-xs">
                {CATEGORIES.map(cat => <option key={cat} value={cat}>{cat}</option>)}
              </select>
            </div>
            <div>
              <label className="text-[11px] text-slate-500 font-medium uppercase tracking-wider block mb-1">Min Turn</label>
              <input type="number" min="1" max="10" value={form.appliesWhen?.minTurn || 1}
                onChange={e => setF({ ...form, appliesWhen: { ...form.appliesWhen, minTurn: parseInt(e.target.value) || 1 } })}
                className="w-full px-3 py-2 rounded-lg text-xs" />
            </div>
            <div className="flex items-end pb-1">
              <label className="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" checked={form.enabled !== false} onChange={e => setF({ ...form, enabled: e.target.checked })}
                  className="accent-sky-500" />
                <span className="text-xs text-slate-300">Enabled</span>
              </label>
            </div>
          </div>
          <div>
            <label className="text-[11px] text-slate-500 font-medium uppercase tracking-wider block mb-1">Segments</label>
            <div className="flex flex-wrap gap-1.5 mt-1">
              <button type="button" onClick={() => setF({ ...form, appliesWhen: { ...form.appliesWhen, segments: ['*'] } })}
                className={`px-2 py-0.5 rounded text-[11px] border cursor-pointer transition-colors ${
                  form.appliesWhen?.segments?.includes('*')
                    ? 'bg-green-500/10 text-green-400 border-green-500/20' : 'bg-slate-800/50 text-slate-500 border-slate-700'
                }`}>All (*)</button>
              {ALL_SEGMENTS.map(seg => {
                const active = form.appliesWhen?.segments?.includes(seg);
                const sc = segmentColor(seg);
                return (
                  <button key={seg} type="button" onClick={() => {
                    const segs = (form.appliesWhen?.segments || []).filter(s => s !== '*');
                    setF({ ...form, appliesWhen: { ...form.appliesWhen, segments: active ? segs.filter(s => s !== seg) : [...segs, seg] } });
                  }} className="px-2 py-0.5 rounded text-[11px] border cursor-pointer transition-colors"
                    style={active ? { background: sc.bg, color: sc.text, borderColor: sc.border } : { background: 'rgba(30,41,59,0.5)', color: '#64748b', borderColor: '#334155' }}>
                    {seg}
                  </button>
                );
              })}
            </div>
          </div>
          <div>
            <label className="text-[11px] text-slate-500 font-medium uppercase tracking-wider block mb-1">
              Prompt <span className="text-slate-600">(system prompt for the LLM judge)</span>
            </label>
            <textarea value={form.prompt || ''} onChange={e => setF({ ...form, prompt: e.target.value })}
              className="w-full px-3 py-2 rounded-lg text-xs font-mono h-40 resize-y leading-relaxed" placeholder="You are evaluating whether..." />
          </div>
          <div className="flex gap-2 pt-1">
            <button type="button" onClick={onSave}
              className="px-4 py-2 rounded-lg text-xs font-medium bg-sky-600 hover:bg-sky-500 transition-colors">{saveLabel}</button>
            <button type="button" onClick={onCancel}
              className="px-4 py-2 rounded-lg text-xs border border-slate-700 text-slate-400 hover:border-slate-600 hover:text-slate-300 transition-colors">Cancel</button>
          </div>
        </div>
      );

      // Get judge results from latest report
      const judgeResults = latestReport?.llmJudge || {};
      const hasJudgeData = Object.keys(judgeResults).length > 0;

      return (
        <div className="space-y-6">
          {/* Judge Results Summary (from latest full eval run) */}
          {hasJudgeData && (
            <div className="rounded-xl border overflow-hidden" style={{ background: '#0d1526', borderColor: '#1e293b' }}>
              <div className="px-5 py-3 border-b border-slate-800 flex items-center justify-between">
                <h3 className="text-sm font-semibold text-slate-300">Latest Judge Results</h3>
                <span className="text-[11px] text-slate-500">{Object.values(judgeResults).reduce((s, v) => s + (v.passed || 0) + (v.failed || 0), 0)} total judgments</span>
              </div>
              <div className="p-4 space-y-2.5">
                {Object.entries(judgeResults).map(([name, stats]) => {
                  const total = (stats.passed || 0) + (stats.failed || 0);
                  const rate = total > 0 ? Math.round((stats.passed / total) * 100) : 0;
                  const fillColor = rate >= 85 ? '#22c55e' : rate >= 65 ? '#eab308' : '#ef4444';
                  const criterion = criteria.find(c => c.id === name);
                  return (
                    <div key={name} className="flex items-center gap-3">
                      <div className="w-44 text-xs text-slate-400 truncate flex-shrink-0">{criterion?.name || name.replace(/_/g, ' ')}</div>
                      <div className="flex-1 progress-track h-2">
                        <div className="progress-fill" style={{ width: `${rate}%`, background: fillColor }} />
                      </div>
                      <div className="w-12 text-right text-xs font-medium" style={{ color: fillColor }}>{rate}%</div>
                      <div className="w-14 text-right text-[11px] text-slate-500">{stats.passed}/{total}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {!hasJudgeData && (
            <div className="rounded-xl border p-5 text-center" style={{ background: '#0d1526', borderColor: '#1e293b' }}>
              <p className="text-sm text-slate-500 mb-1">No LLM judge results yet</p>
              <p className="text-xs text-slate-600">Run a <strong>Full Eval</strong> from the Overview tab to see judge results per criterion</p>
            </div>
          )}

          {/* Judge Criteria Header */}
          <div className="rounded-xl border p-4 flex items-center justify-between" style={{ background: '#0d1526', borderColor: '#1e293b' }}>
            <div className="flex items-center gap-4 flex-wrap">
              <h3 className="font-semibold text-slate-200">Judge Criteria</h3>
              <div className="flex items-center gap-2">
                <label className="text-[11px] text-slate-500 font-medium uppercase tracking-wider">Model:</label>
                <select value={criteriaModel} onChange={e => setCriteriaModel(e.target.value)}
                  className="px-2.5 py-1 rounded-lg text-xs">
                  <option value="gpt-4o-mini">gpt-4o-mini</option>
                  <option value="gpt-4o">gpt-4o</option>
                  <option value="gpt-4.1-mini">gpt-4.1-mini</option>
                </select>
                <button onClick={saveModel} disabled={savingModel}
                  className="px-2.5 py-1 rounded-lg text-xs bg-sky-600 hover:bg-sky-500 disabled:opacity-50 transition-colors">
                  {savingModel ? '...' : 'Save'}
                </button>
              </div>
              <span className="text-xs text-slate-500">{criteria.length} criteria ({criteria.filter(c => c.enabled).length} enabled)</span>
            </div>
            <button onClick={() => setShowAdd(!showAdd)}
              className={`px-4 py-2 rounded-lg text-xs font-medium transition-colors ${
                showAdd ? 'border border-slate-700 text-slate-400 hover:border-slate-600' : 'bg-sky-600 hover:bg-sky-500'
              }`}>
              {showAdd ? 'Cancel' : '+ New Criterion'}
            </button>
          </div>

          {/* Add form */}
          {showAdd && <CriterionForm form={addForm} setForm={setAddForm} onSave={addCriterion} onCancel={() => setShowAdd(false)} saveLabel="Create" />}

          {/* Criteria grouped by category */}
          {Object.entries(categoryGroups).map(([cat, items]) => (
            <div key={cat} className="space-y-3">
              <h4 className="text-[11px] font-bold text-slate-500 uppercase tracking-widest flex items-center gap-2">
                <span className="w-2 h-2 rounded-full" style={{ background: catDot(cat) }} />
                {cat} ({items.length})
              </h4>
              {items.map(c => (
                <div key={c.id} className={`rounded-xl border p-4 transition-all ${!c.enabled ? 'opacity-50' : ''}`}
                  style={{ background: '#0d1526', borderColor: editingId === c.id ? 'rgba(56,189,248,0.3)' : '#1e293b' }}>
                  {editingId === c.id ? (
                    <CriterionForm form={editForm} setForm={setEditForm} onSave={saveEdit} onCancel={cancelEdit} saveLabel="Save" />
                  ) : (
                    <div className="flex items-start justify-between gap-4">
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2.5 mb-1.5">
                          <button onClick={() => toggleCriterion(c.id)}
                            className={`relative inline-flex h-5 w-9 items-center rounded-full transition-colors flex-shrink-0 ${c.enabled ? 'bg-sky-600' : 'bg-slate-700'}`}>
                            <span className={`inline-block h-3.5 w-3.5 transform rounded-full bg-white transition-transform ${c.enabled ? 'translate-x-4' : 'translate-x-0.5'}`} />
                          </button>
                          <span className="text-sm font-medium text-slate-200">{c.name}</span>
                          <span className="font-mono text-[10px] text-slate-600">{c.id}</span>
                        </div>
                        <p className="text-xs text-slate-400 mb-2.5 leading-relaxed">{c.description}</p>
                        <div className="flex flex-wrap gap-1.5">
                          {(c.appliesWhen?.segments || []).includes('*')
                            ? <span className="px-1.5 py-0.5 rounded text-[10px] border" style={{ background: 'rgba(148,163,184,0.06)', color: '#64748b', borderColor: 'rgba(148,163,184,0.15)' }}>All segments</span>
                            : (c.appliesWhen?.segments || []).map(s => <SegmentBadge key={s} seg={s} />)
                          }
                          {(c.appliesWhen?.intents || []).includes('*')
                            ? <span className="px-1.5 py-0.5 rounded text-[10px] border" style={{ background: 'rgba(148,163,184,0.06)', color: '#64748b', borderColor: 'rgba(148,163,184,0.15)' }}>All intents</span>
                            : (c.appliesWhen?.intents || []).slice(0, 3).map(i => (
                              <span key={i} className="px-1.5 py-0.5 rounded text-[10px] border" style={{ background: 'rgba(234,179,8,0.06)', color: '#eab308', borderColor: 'rgba(234,179,8,0.15)' }}>
                                {i.replace('INTENT_', '')}
                              </span>
                            ))
                          }
                          {(c.appliesWhen?.intents || []).length > 3 && (
                            <span className="px-1.5 py-0.5 rounded text-[10px] text-slate-600">+{c.appliesWhen.intents.length - 3}</span>
                          )}
                          {(c.appliesWhen?.minTurn || 1) > 1 && (
                            <span className="px-1.5 py-0.5 rounded text-[10px] border" style={{ background: 'rgba(148,163,184,0.06)', color: '#94a3b8', borderColor: 'rgba(148,163,184,0.15)' }}>
                              Turn {c.appliesWhen.minTurn}+
                            </span>
                          )}
                          {c.preCheck && (
                            <span className="px-1.5 py-0.5 rounded text-[10px] border" style={{ background: 'rgba(34,197,94,0.06)', color: '#4ade80', borderColor: 'rgba(34,197,94,0.15)' }}>
                              Pre-check
                            </span>
                          )}
                        </div>
                      </div>
                      <div className="flex gap-2 flex-shrink-0">
                        <button onClick={() => startEdit(c)}
                          className="px-3 py-1.5 rounded-lg text-xs border border-slate-700 text-slate-400 hover:border-slate-600 hover:text-slate-300 transition-colors">Edit</button>
                        <button onClick={() => { if (confirm(`Delete criterion "${c.name}"?`)) deleteCriterion(c.id); }}
                          className="px-3 py-1.5 rounded-lg text-xs border border-red-900/30 text-red-400/60 hover:border-red-700/40 hover:text-red-400 transition-colors">Delete</button>
                      </div>
                    </div>
                  )}
                </div>
              ))}
            </div>
          ))}

        </div>
      );
    }

    // ── Settings Tab ──────────────────────────────────────────────────────────────
    function SettingsTab({ showToast, report: latestReport }) {
      const [reports, setReports] = useState([]);
      const [expandedReport, setExpandedReport] = useState(null);
      const [expandedReportData, setExpandedReportData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [expandedEval, setExpandedEval] = useState(null);

      useEffect(() => {
        apiCall('/reports').catch(() => ({ reports: [] }))
          .then(r => setReports(r.reports || []))
          .finally(() => setLoading(false));
      }, []);

      const loadReport = async (filename) => {
        if (expandedReport === filename) { setExpandedReport(null); setExpandedReportData(null); return; }
        setExpandedReport(filename);
        try {
          const data = await apiCall(`/reports/${filename}`);
          setExpandedReportData(data.report || data);
        } catch (e) { setExpandedReportData(null); }
      };

      if (loading) {
        return <div className="flex items-center justify-center py-16"><span className="spinner" style={{ width: 24, height: 24 }} /></div>;
      }

      return (
        <div className="space-y-6">
          {/* Code Evals Reference */}
          {(() => {
            const CODE_EVALS = [
